workflows:

  # ──────────────────────────────────────────────
  # 1. Debug APK
  # ──────────────────────────────────────────────
  android-debug:
    name: Android Debug APK
    max_build_duration: 60
    environment:
      flutter: 3.22.2
      java: 17

    scripts:
      - name: Get Flutter packages
        script: |
          set -e
          flutter pub get

      - name: Build debug APK
        script: |
          set -e
          flutter build apk \
            --debug \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true


  # ──────────────────────────────────────────────
  # 2. Release APK  (signed with debug key — same as working repo)
  # ──────────────────────────────────────────────
  android-release:
    name: Android Release APK
    max_build_duration: 60
    environment:
      flutter: 3.22.2
      java: 17

    scripts:
      - name: Get Flutter packages
        script: |
          set -e
          flutter pub get

      - name: Build release APK
        script: |
          set -e
          flutter build apk \
            --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/mapping/release/mapping.txt

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
