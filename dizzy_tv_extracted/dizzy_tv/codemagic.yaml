workflows:

  # ──────────────────────────────────────────────
  # 1. Debug APK  (no signing required)
  # ──────────────────────────────────────────────
  android-debug:
    name: Android Debug APK
    max_build_duration: 60
    environment:
      flutter: 3.22.2
      java: 17

    scripts:
      - name: Generate native project folders (flutter create)
        script: |
          flutter create . \
            --project-name dizzy_tv \
            --org com.dizzytv \
            --platforms android

      - name: Patch withValues to withOpacity for Flutter 3.22.2 compatibility
        script: |
          python3 << 'PYEOF'
          import re, os
          for root, dirs, files in os.walk('.'):
              for fname in files:
                  if fname.endswith('.dart'):
                      fpath = os.path.join(root, fname)
                      original = open(fpath, encoding='utf-8').read()
                      patched = re.sub(r'\.withValues\((?:alpha:\s*)?', '.withOpacity(', original)
                      if patched != original:
                          open(fpath, 'w', encoding='utf-8').write(patched)
          PYEOF

      - name: Copy google-services.json
        script: |
          cp android_setup_files/app/google-services.json android/app/google-services.json

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build debug APK
        script: |
          flutter build apk \
            --debug \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

    publishing:
      email:
        recipients:
          - your@email.com   # ← replace with your e-mail
        notify:
          success: true
          failure: true


  # ──────────────────────────────────────────────
  # 2. Release APK  (requires keystore secrets)
  # ──────────────────────────────────────────────
  android-release:
    name: Android Release APK
    max_build_duration: 60
    environment:
      flutter: 3.22.2
      java: 17
      # Add these in Codemagic → App settings → Environment variables
      # group name: keystore_credentials
      #   CM_KEYSTORE       – base64-encoded .jks file
      #   CM_KEY_ALIAS      – key alias
      #   CM_KEY_PASSWORD   – key password
      #   CM_STORE_PASSWORD – keystore password
      groups:
        - keystore_credentials

    scripts:
      - name: Generate native project folders (flutter create)
        script: |
          flutter create . \
            --project-name dizzy_tv \
            --org com.dizzytv \
            --platforms android

      - name: Patch withValues to withOpacity for Flutter 3.22.2 compatibility
        script: |
          python3 << 'PYEOF'
          import re, os
          for root, dirs, files in os.walk('.'):
              for fname in files:
                  if fname.endswith('.dart'):
                      fpath = os.path.join(root, fname)
                      original = open(fpath, encoding='utf-8').read()
                      patched = re.sub(r'\.withValues\((?:alpha:\s*)?', '.withOpacity(', original)
                      if patched != original:
                          open(fpath, 'w', encoding='utf-8').write(patched)
          PYEOF

      - name: Set up keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > $CM_BUILD_DIR/keystore.jks
          cat >> "$CM_BUILD_DIR/android/key.properties" << KEOF
          storePassword=$CM_STORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_BUILD_DIR/keystore.jks
          KEOF

      - name: Copy google-services.json
        script: |
          cp android_setup_files/app/google-services.json android/app/google-services.json

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build release APK
        script: |
          flutter build apk \
            --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/mapping/release/mapping.txt

    publishing:
      email:
        recipients:
          - your@email.com   # ← replace with your e-mail
        notify:
          success: true
          failure: true
