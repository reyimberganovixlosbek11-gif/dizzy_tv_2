workflows:

  # ──────────────────────────────────────────────
  # 1. Debug APK  (no signing required)
  # ──────────────────────────────────────────────
  android-debug:
    name: Android Debug APK
    max_build_duration: 60
    environment:
      flutter: 3.22.2        # Pin to a stable 3.x release; bump as needed
      java: 17

    scripts:
      # Place google-services.json where the Android build expects it
      - name: Copy google-services.json
        script: |
          cp android_setup_files/app/google-services.json android/app/google-services.json

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build debug APK
        script: |
          flutter build apk \
            --debug \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

    publishing:
      email:
        recipients:
          - your@email.com   # ← replace with your e-mail
        notify:
          success: true
          failure: true


  # ──────────────────────────────────────────────
  # 2. Release APK  (requires keystore secrets)
  # ──────────────────────────────────────────────
  android-release:
    name: Android Release APK
    max_build_duration: 60
    environment:
      flutter: 3.22.2
      java: 17
      # Add these secrets in Codemagic → App settings → Environment variables:
      #   CM_KEYSTORE        – base64-encoded .jks / .keystore file
      #   CM_KEY_ALIAS       – key alias
      #   CM_KEY_PASSWORD    – key password
      #   CM_STORE_PASSWORD  – keystore password
      groups:
        - keystore_credentials   # create this group in Codemagic with the vars above

    scripts:
      # Decode and write the keystore
      - name: Set up keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > $CM_BUILD_DIR/keystore.jks
          cat >> "$CM_BUILD_DIR/android/key.properties" <<EOF
          storePassword=$CM_STORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_BUILD_DIR/keystore.jks
          EOF

      # Place google-services.json where the Android build expects it
      - name: Copy google-services.json
        script: |
          cp android_setup_files/app/google-services.json android/app/google-services.json

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build release APK
        script: |
          flutter build apk \
            --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/mapping/release/mapping.txt   # ProGuard map (useful for crash reports)

    publishing:
      email:
        recipients:
          - your@email.com   # ← replace with your e-mail
        notify:
          success: true
          failure: true
